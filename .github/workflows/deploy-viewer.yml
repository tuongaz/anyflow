name: Deploy Viewer

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy apps/viewer to S3 + CloudFront
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web (studio UI)
        run: cd apps/web && bun run build

      - name: Commit and push dist/web if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/studio/dist/web
          if git diff --cached --quiet; then
            echo "dist/web unchanged, skipping commit"
          else
            git commit -m "build: rebuild dist/web [skip ci]"
            git push
          fi

      - name: Build viewer
        run: cd apps/viewer && bun run build

      - name: Get deployment targets from CloudFormation
        id: cfn
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name SeeflowStack \
            --query "Stacks[0].Outputs[?OutputKey=='ViewerBucketName'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

          CF_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name SeeflowStack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomain'].OutputValue" \
            --output text)

          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?DomainName=='${CF_DOMAIN}'].Id | [0]" \
            --output text)
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync hashed assets (immutable cache)
        run: |
          aws s3 sync apps/viewer/dist s3://${{ steps.cfn.outputs.bucket }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp apps/viewer/dist/index.html \
            s3://${{ steps.cfn.outputs.bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cfn.outputs.dist_id }} \
            --paths "/*"

      - name: Summary
        run: echo "Deployed apps/viewer to https://seeflow.dev" >> "$GITHUB_STEP_SUMMARY"
